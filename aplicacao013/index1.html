<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    h1{
        color: red;
    }
    .quadro_maior{
        background-color: black;
        width: 900px;
        height: 500px;
        border: 1px solid red;
        margin: auto;
        position: relative;
        
    }
    .quadrado_menor{
        background-color: aliceblue;
        width: 250px;
        height: 250px;
        position: absolute;

        top: 50%;
        left: 50%;

        transform: translate(-50%,-50%);
    }




</style>


<body>
    <h1>Oi</h1>
    <div class="quadro_maior">
        <div class="quadrado_menor">    
        </div>
    </div>





    
</body>
</html>
